<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase Multi-Device Race Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
            text-align: center;
            background-color: #f4f7f6;
        }
        .display {
            font-size: 3rem;
            font-weight: bold;
            margin: 20px 0;
            font-family: monospace;
            color: #333;
        }
        .input-group {
            margin: 20px 0;
        }
        input[type="text"] {
            font-size: 1rem;
            padding: 10px;
            width: 60%;
            max-width: 300px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            font-size: 1rem;
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            background-color: #007bff;
            color: white;
        }
        button:hover { background-color: #0056b3; }
        button.stop { background-color: #dc3545; }
        button.save { background-color: #28a745; }
        button.export { background-color: #17a2b8; }
        
        table {
            width: 100%;
            margin-top: 30px;
            border-collapse: collapse;
            background: white;
        }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #f2f2f2; }
    </style>
</head>
<body>

    <h2>Live Multi-Device Race Stopwatch</h2>
    <div class="display" id="display">00:00:00.00</div>

    <div class="input-group">
        <input type="text" id="obstacleName" placeholder="Next Obstacle Name">
    </div>

    <button id="startStopBtn" onclick="handleStartStopClick()">Start</button>
    <button onclick="handleRecordClick()" class="save">Record Obstacle</button>
    <button onclick="handleResetClick()">Reset Timer</button>
    <button onclick="exportToExcel()" class="export">Download Excel</button>

    <h3>Recorded Times (Global Sync)</h3>
    <table>
        <thead>
            <tr>
                <th>Obstacle / Marker Name</th>
                <th>Timestamp</th>
                <th>Split Time</th>
            </tr>
        </thead>
        <tbody id="resultsBody"></tbody>
    </table>

    <script>
        // --- 1. PASTE YOUR COPIED FIREBASE CONFIG HERE ---
        const firebaseConfig = {
            apiKey: "AIzaSyBZ-4464p7-F_ZeBkAWv5012DcW0EyECCA",
            authDomain: "race-stopwatch.firebaseapp.com",
            databaseURL: "https://race-stopwatch-default-rtdb.firebaseio.com", // Added this for you!
            projectId: "race-stopwatch",
            storageBucket: "race-stopwatch.firebasestorage.app",
            messagingSenderId: "1097845465509",
            appId: "1:1097845465509:web:cf537f80734c8132bc484c"
        };

        // Initialize Firebase connection
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Local Tracking Variables
        let timerInterval;
        let isRunning = false;
        let startTime = 0;
        let elapsedTime = 0;
        let obstacleCount = 0;
        let raceData = []; 

        // --- 2. LIVE DATABASE LISTENERS ---
        
        // Listen to the timer engine state
        database.ref('timerState').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                isRunning = data.isRunning;
                startTime = data.startTime;
                elapsedTime = data.elapsedTime;
                updateClockUI();
            }
        });

        // Listen for record table updates
        database.ref('records').on('value', (snapshot) => {
            const data = snapshot.val();
            const tbody = document.getElementById('resultsBody');
            tbody.innerHTML = ''; 
            raceData = [];        
            
            if (data) {
                Object.keys(data).forEach((key) => {
                    const record = data[key];
                    const row = `<tr>
                        <td>${record.name}</td>
                        <td>${record.timestamp}</td>
                        <td>${record.splitTime}</td>
                    </tr>`;
                    tbody.innerHTML += row;

                    raceData.push({
                        "Obstacle Name": record.name,
                        "Time of Day": record.timestamp,
                        "Race Duration": record.splitTime
                    });
                });
                obstacleCount = Object.keys(data).length;
            } else {
                obstacleCount = 0;
            }
        });

        // --- 3. UI RENDERING CLOCK LOOP ---
        function updateClockUI() {
            clearInterval(timerInterval);
            const btn = document.getElementById('startStopBtn');

            if (isRunning) {
                btn.innerText = 'Stop';
                btn.className = 'stop';
                timerInterval = setInterval(() => {
                    document.getElementById('display').innerText = formatTime(Date.now() - startTime);
                }, 10);
            } else {
                btn.innerText = 'Start';
                btn.className = '';
                document.getElementById('display').innerText = formatTime(elapsedTime);
            }
        }

        // --- 4. DATA SYNCHRONIZATION EVENT ACTIONS ---
        function handleStartStopClick() {
            if (!isRunning) {
                database.ref('timerState').set({
                    isRunning: true,
                    startTime: Date.now() - elapsedTime,
                    elapsedTime: elapsedTime
                });
            } else {
                database.ref('timerState').set({
                    isRunning: false,
                    startTime: startTime,
                    elapsedTime: Date.now() - startTime
                });
            }
        }

        function handleRecordClick() {
            let currentTrackedTime = isRunning ? (Date.now() - startTime) : elapsedTime;
            if (currentTrackedTime === 0) return;

            const nameInput = document.getElementById('obstacleName');
            let customName = nameInput.value.trim();
            if (customName === "") customName = `Obstacle ${obstacleCount + 1}`;

            database.ref('records').push({
                name: customName,
                timestamp: new Date().toLocaleTimeString(),
                splitTime: formatTime(currentTrackedTime)
            });

            nameInput.value = "";
        }

        function handleResetClick() {
            database.ref('timerState').set({ isRunning: false, startTime: 0, elapsedTime: 0 });
            database.ref('records').remove(); // Clears out history globally for a clean run
        }

        function formatTime(ms) {
            if (ms < 0) ms = 0;
            let milliseconds = Math.floor((ms % 1000) / 10);
            let seconds = Math.floor((ms / 1000) % 60);
            let minutes = Math.floor((ms / (1000 * 60)) % 60);
            let hours = Math.floor((ms / (1000 * 60 * 60)) % 24);
            return [hours, minutes, seconds].map(v => v.toString().padStart(2, '0')).join(':') + '.' + milliseconds.toString().padStart(2, '0');
        }

        function exportToExcel() {
            if (raceData.length === 0) return alert("No times recorded yet!");
            const worksheet = XLSX.utils.json_to_sheet(raceData);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "Race Results");
            XLSX.writeFile(workbook, "race_results.xlsx");
        }
    </script>
</body>
</html>
